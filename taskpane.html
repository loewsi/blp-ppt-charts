<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SlideChart</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="/src/taskpane/taskpane.css" />
  </head>
  <body>
    <header class="hdr">
      <h1>SlideChart</h1>
      <span class="sub">Stacked column &middot; live-linked</span>
    </header>

    <main id="app" hidden>
      <p id="editing" class="editing">New chart — not inserted yet</p>

      <section class="panel">
        <label class="lbl" for="chartSelect">Edit an existing chart</label>
        <div class="row">
          <button id="editSelectedBtn" class="ghost wide">Edit selected chart</button>
        </div>
        <div class="row">
          <select id="chartSelect"><option value="">(none loaded)</option></select>
          <button id="refreshBtn" class="ghost" title="Rescan the current slide">&#x21bb;</button>
          <button id="loadBtn" class="ghost">Load</button>
        </div>
      </section>

      <section class="panel">
        <div class="grid-scroll">
          <table id="grid"></table>
        </div>
        <div class="row">
          <button id="addSeriesBtn" class="ghost">+ Series</button>
          <button id="addCatBtn" class="ghost">+ Category</button>
          <button id="transposeBtn" class="ghost" title="Swap rows and columns">Transpose</button>
        </div>
        <details class="paste">
          <summary>Paste from Excel</summary>
          <textarea id="pasteArea" rows="4"
            placeholder="Copy a range in Excel and paste here.&#10;Top row = category names, first column = series names."></textarea>
          <button id="pasteLoadBtn" class="ghost wide">Load pasted data</button>
        </details>
      </section>

      <section class="panel">
        <label class="lbl">Chart style</label>
        <div class="opts">
          <label>Type
            <select id="optOrientation">
              <option value="column">Column</option>
              <option value="bar">Bar (horizontal)</option>
            </select>
          </label>
          <label>Arrangement
            <select id="optGrouping">
              <option value="stacked">Stacked</option>
              <option value="clustered">Clustered</option>
              <option value="stacked100">100% stacked</option>
            </select>
          </label>
          <label>Gap %
            <input id="optGap" type="number" min="0" max="90" step="5" value="35" />
          </label>
          <label class="chk"><input id="optTotals" type="checkbox" checked /> Totals</label>
          <label class="chk"><input id="optLabels" type="checkbox" checked /> Value labels</label>
          <label class="chk"><input id="optReverse" type="checkbox" /> Reverse order</label>
        </div>

        <label class="lbl mt">Number format</label>
        <div class="opts">
          <label>Decimals
            <input id="nfDecimals" type="number" min="0" max="3" step="1" value="0" />
          </label>
          <label>Scale
            <select id="nfScale">
              <option value="none">None</option>
              <option value="k">Thousands (k)</option>
              <option value="M">Millions (M)</option>
            </select>
          </label>
          <label>Prefix <input id="nfPrefix" type="text" placeholder="$" /></label>
          <label>Suffix <input id="nfSuffix" type="text" placeholder="kg" /></label>
          <label class="chk"><input id="nfHideZero" type="checkbox" checked /> Hide zeros</label>
        </div>
        <p class="hint">Style changes apply when you Insert or Update.</p>
      </section>

      <section class="panel actions">
        <button id="insertBtn" class="primary">Insert new chart</button>
        <button id="updateBtn" class="primary" disabled>Update this chart</button>
        <button id="newBtn" class="ghost">New</button>
      </section>

      <p id="status" class="status"></p>
    </main>

    <div id="unsupported" class="unsupported" hidden>
      This add-in must be opened inside PowerPoint.
    </div>

    <script type="module" src="/src/taskpane/taskpane.ts"></script>
  </body>
</html>
