<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SlideChart</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="/src/taskpane/taskpane.css" />
  </head>
  <body>
    <header class="hdr">
      <h1>SlideChart</h1>
      <span class="sub">Stacked column &middot; live-linked</span>
    </header>

    <main id="app" hidden>
      <p id="editing" class="editing">New chart — not inserted yet</p>

      <section class="panel">
        <div id="grid" class="grid"></div>
        <div class="row">
          <button id="addSeriesBtn" class="ghost">+ Series</button>
          <button id="removeSeriesBtn" class="ghost">− Series</button>
          <button id="addCatBtn" class="ghost">+ Category</button>
          <button id="removeCatBtn" class="ghost">− Category</button>
          <button id="transposeBtn" class="ghost" title="Swap rows and columns">Transpose</button>
        </div>
        <p id="typeHint" class="hint" hidden></p>
      </section>

      <section class="panel">
        <label class="lbl">Chart style</label>
        <div class="opts">
          <label>Chart
            <select id="chartType">
              <option value="barColumn">Column / Bar</option>
              <option value="line">Line</option>
              <option value="combination">Combination</option>
              <option value="pie">Pie / doughnut</option>
              <option value="scatter">Scatter / bubble</option>
              <option value="mekko">Mekko</option>
              <option value="waterfall">Waterfall</option>
            </select>
          </label>
          <label>Orientation
            <select id="optOrientation">
              <option value="column">Vertical bars (column)</option>
              <option value="bar">Horizontal bars (bar)</option>
            </select>
          </label>
          <label>Arrangement
            <select id="optGrouping">
              <option value="stacked">Stacked</option>
              <option value="clustered">Clustered</option>
              <option value="stacked100">100% stacked</option>
            </select>
          </label>
          <label>Gap %
            <input id="optGap" type="number" min="0" max="90" step="5" value="35" />
          </label>
          <label>Reference line
            <input id="optRefValue" type="number" step="any" placeholder="off" />
          </label>
          <label>Doughnut hole %
            <input id="optPieHole" type="number" min="0" max="90" step="5" value="0" />
          </label>
          <label>Reference color
            <input id="optRefColor" type="color" value="#E8412C" />
          </label>
          <label>Axis min
            <input id="optAxisMin" type="number" step="any" placeholder="auto" />
          </label>
          <label>Axis max
            <input id="optAxisMax" type="number" step="any" placeholder="auto" />
          </label>
          <label>Line axis min
            <input id="optLineAxisMin" type="number" step="any" placeholder="auto" />
          </label>
          <label>Line axis max
            <input id="optLineAxisMax" type="number" step="any" placeholder="auto" />
          </label>
          <label class="chk"><input id="optTotals" type="checkbox" checked /> Totals</label>
          <label class="chk"><input id="optLabels" type="checkbox" checked /> Value labels</label>
          <label class="chk"><input id="optReverse" type="checkbox" /> Reverse categories</label>
          <label class="chk"><input id="optReverseSeries" type="checkbox" /> Reverse series</label>
          <label class="chk"><input id="optLegend" type="checkbox" /> Legend</label>
          <label class="chk"><input id="optGridlines" type="checkbox" /> Gridlines</label>
          <label class="chk"><input id="optAxis" type="checkbox" /> Axis labels</label>
          <label class="chk"><input id="optAxisLine" type="checkbox" /> Axis line</label>
          <label class="chk"><input id="optConnectors" type="checkbox" /> Connectors</label>
          <label class="chk"><input id="optLineSecondaryAxis" type="checkbox" /> Line 2nd axis</label>
          <label class="chk"><input id="optScatterQuadrant" type="checkbox" /> Quadrant lines</label>
          <label class="chk"><input id="optScatterAxes" type="checkbox" checked /> Scatter axes</label>
          <label>Legend pos
            <select id="legendPosition">
              <option value="bottom">Bottom</option>
              <option value="top">Top</option>
              <option value="left">Left</option>
              <option value="right">Right</option>
            </select>
          </label>
        </div>

        <label class="lbl mt">Number format</label>
        <div class="opts">
          <label>Decimals
            <input id="nfDecimals" type="number" min="0" max="3" step="1" value="0" />
          </label>
          <label>Magnitude
            <select id="nfScale">
              <option value="0">None</option>
              <option value="-3">×10⁻³ (thousands)</option>
              <option value="-6">×10⁻⁶ (millions)</option>
              <option value="-9">×10⁻⁹ (billions)</option>
              <option value="3">×10³</option>
              <option value="6">×10⁶</option>
            </select>
          </label>
          <label>Prefix <input id="nfPrefix" type="text" placeholder="$" /></label>
          <label>Suffix <input id="nfSuffix" type="text" placeholder="kg" /></label>
          <label>Separators
            <select id="nfSep">
              <option value="comma">1,234.56</option>
              <option value="dot">1.234,56</option>
              <option value="apos">1'234.56</option>
              <option value="space">1 234,56</option>
              <option value="locale">System</option>
            </select>
          </label>
          <label class="chk"><input id="nfHideZero" type="checkbox" checked /> Hide zeros</label>
          <label class="chk"><input id="nfThousands" type="checkbox" checked /> Group thousands</label>
          <label class="chk"><input id="nfParens" type="checkbox" /> Negatives ( )</label>
          <label class="chk"><input id="nfPlus" type="checkbox" /> Plus sign</label>
        </div>

        <label class="lbl mt" id="arrowsHeading">Arrows</label>
        <div class="opts" id="arrowsOpts">
          <label>Difference
            <select id="optDiffArrow">
              <option value="off">Off</option>
              <option value="total">Between totals</option>
              <option value="series">Between a series</option>
            </select>
          </label>
          <label class="chk"><input id="optDiffPercent" type="checkbox" /> Show %</label>
          <label>From cat # <input id="optDiffFrom" type="number" min="1" step="1" value="1" /></label>
          <label>To cat # <input id="optDiffTo" type="number" min="1" step="1" value="2" /></label>
          <label>Series # <input id="optDiffSeries" type="number" min="1" step="1" value="1" /></label>
          <label>Position <input id="optDiffPos" type="number" min="0" step="1" placeholder="auto" /></label>
          <label>CAGR
            <select id="optCagrArrow">
              <option value="off">Off</option>
              <option value="total">Of totals</option>
              <option value="series">Of a series</option>
            </select>
          </label>
          <label>From cat # <input id="optCagrFrom" type="number" min="1" step="1" value="1" /></label>
          <label>To cat # <input id="optCagrTo" type="number" min="1" step="1" value="2" /></label>
          <label>Series # <input id="optCagrSeries" type="number" min="1" step="1" value="1" /></label>
          <label>Periods <input id="optCagrPeriods" type="number" min="0" step="1" value="0" placeholder="auto" /></label>
        </div>

        <label class="lbl mt">Text &amp; labels</label>
        <div class="opts">
          <label>Font
            <select id="fontFamily">
              <option>Roboto</option>
              <option>Arial</option>
              <option>Calibri</option>
              <option>Segoe UI</option>
              <option>Georgia</option>
              <option>Verdana</option>
            </select>
          </label>
          <label>Value labels
            <select id="labelOverflow">
              <option value="inside">Inside (smart)</option>
              <option value="outside">Outside</option>
            </select>
          </label>
          <label>Label shows
            <select id="labelMode">
              <option value="value">Value</option>
              <option value="percent">Percent</option>
              <option value="valuePercent">Value (%)</option>
              <option value="percentValue">% (Value)</option>
            </select>
          </label>
          <label>Segment size <input id="segFontSize" type="number" min="6" max="24" step="1" value="9" /></label>
          <label>Total size <input id="totFontSize" type="number" min="6" max="24" step="1" value="10" /></label>
        </div>

        <label class="lbl mt">Colors</label>
        <div class="row">
          <select id="colorScheme">
            <option value="master">Master accents</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="red">Red</option>
            <option value="orange">Orange</option>
            <option value="multi">Multi-color</option>
            <option value="grayscale">Grayscale</option>
          </select>
          <button id="applyColorsBtn" class="ghost">Apply</button>
        </div>
        <div class="row">
          <input id="shadeBase" type="color" value="#2E75FF" title="Base color for shades" />
          <button id="shadeBtn" class="ghost">Auto-shades from base</button>
        </div>
        <div id="seriesColors" class="swatches"></div>
      </section>

      <section class="panel actions">
        <button id="insertBtn" class="primary wide">Insert chart</button>
      </section>

      <section class="panel">
        <label class="lbl">Agenda / table of contents</label>
        <textarea id="agendaList" class="agenda" rows="4" placeholder="One chapter per line"></textarea>
        <button id="agendaBtn" class="ghost wide">Create / update agenda slide</button>
      </section>
      <p class="hint">Edits apply live to the selected chart. Duplicate a chart by copy-pasting it on the slide.</p>

      <p id="status" class="status"></p>
    </main>

    <div id="unsupported" class="unsupported" hidden>
      This add-in must be opened inside PowerPoint.
    </div>

    <script type="module" src="/src/taskpane/taskpane.ts"></script>
  </body>
</html>
